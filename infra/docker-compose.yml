services:
  mongo:
    image: mongo:7
    container_name: agentautomation-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongo-init-replica:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      bash -c "
      mongosh --host mongo:27017 --eval '
        rs.initiate({
          _id: \"rs0\",
          members: [{ _id: 0, host: \"mongo:27017\" }]
        })
      ' || true
      "

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: backend
    container_name: agentautomation-backend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      mongo:
        condition: service_healthy
      mongo-init-replica:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: backend
    container_name: agentautomation-worker
    command: ["npm", "run", "worker"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[n]ode src/agents/runner.js' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: frontend
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:${BACKEND_PORT:-5000}"
    container_name: agentautomation-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode<500?0:1)).on('error', () => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s

  nginx:
    image: nginx:1.27-alpine
    container_name: agentautomation-nginx
    profiles: ["proxy"]
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
volumes:
  mongo_data:

